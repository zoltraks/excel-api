server:
  port: 8443
  host: "0.0.0.0"
  base_path: "/api/v1"
  tls:
    enabled: false

openapi:
  title: "Excel API - Test"
  description: "Test instance"
  servers:
    - url: "http://localhost:8443/api/v1"
      description: "Test"

workbooks:
  base_dir: "/data/workbooks"
  registry:
    - id: "simple"
      path: "simple.xlsx"
      readonly: false
    - id: "styled"
      path: "styled.xlsx"
      readonly: false
    - id: "formulas"
      path: "formulas.xlsx"
      readonly: false
    - id: "readonly-test"
      path: "simple.xlsx"
      readonly: true

queue:
  batch_max_size: 50
  batch_debounce_ms: 100
  lock_timeout_ms: 10000
  lock_dir: "/data/locks"

cache:
  enabled: true
  invalidation: "mtime"
  poll_interval_ms: 1000

auth:
  mode: "both"
  jwt:
    issuer: "excel-api-test"
    expiration_minutes: 60
    algorithm: "HS256"

logging:
  level: "verbose"
  format: "json"
