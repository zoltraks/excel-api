server:
  port: 8443
  host: "0.0.0.0"
  base_path: "/api/v1"
  tls:
    enabled: false

openapi:
  title: "Excel API"
  description: "Excel file data service"
  servers:
    - url: "http://localhost:8443/api/v1"
      description: "Local"

workbooks:
  base_dir: "/data/workbooks"
  registry:
    - id: "sample"
      path: "sample.xlsx"
      readonly: false

queue:
  batch_max_size: 50
  batch_debounce_ms: 200
  lock_timeout_ms: 30000
  lock_dir: "/data/locks"

cache:
  enabled: true
  invalidation: "mtime"
  poll_interval_ms: 2000

auth:
  mode: "both"
  jwt:
    issuer: "excel-api"
    expiration_minutes: 60
    algorithm: "HS256"

logging:
  level: "info"
  format: "json"
