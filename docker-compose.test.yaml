services:
  excel-api:
    build:
      context: ./${IMAGE:-excel-api-node}
    volumes:
      - ./excel-api-test/fixture:/data/workbooks:ro
      - ./excel-api-test/config/config.test.yaml:/etc/excel-api/config.yaml:ro
      - ./excel-api-test/config/access.test.yaml:/etc/excel-api/access.yaml:ro
      - ./work/data/locks:/data/locks
    environment:
      - CONFIG_PATH=/etc/excel-api/config.yaml
      - ACCESS_PATH=/etc/excel-api/access.yaml
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:8443/health || curl -f http://localhost:8443/api/v1/health"]
      interval: 2s
      retries: 10

  tests:
    build: ./excel-api-test
    depends_on:
      excel-api:
        condition: service_healthy
    environment:
      - API_URL=http://excel-api:8443${API_PATH:-}
